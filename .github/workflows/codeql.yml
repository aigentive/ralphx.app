name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pull-requests: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: Detect CodeQL scope
    runs-on: ubuntu-latest
    outputs:
      run_actions: ${{ steps.decide.outputs.run_actions }}
      run_javascript: ${{ steps.decide.outputs.run_javascript }}
      run_rust: ${{ steps.decide.outputs.run_rust }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            actions:
              - '.github/workflows/**'
              - '.github/codeql/**'
            javascript:
              - 'frontend/**'
              - 'plugins/app/ralphx-external-mcp/**'
              - 'plugins/app/ralphx-mcp-server/**'
            rust:
              - 'src-tauri/**'
              - 'rust-toolchain.toml'

      - name: Decide CodeQL scope
        id: decide
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" != "pull_request" ]]; then
            echo "run_actions=true" >> "${GITHUB_OUTPUT}"
            echo "run_javascript=true" >> "${GITHUB_OUTPUT}"
            echo "run_rust=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "run_actions=${{ steps.filter.outputs.actions }}" >> "${GITHUB_OUTPUT}"
          echo "run_javascript=${{ steps.filter.outputs.javascript }}" >> "${GITHUB_OUTPUT}"
          echo "run_rust=${{ steps.filter.outputs.rust }}" >> "${GITHUB_OUTPUT}"

  analyze-actions:
    name: Analyze (actions)
    needs: changes
    if: needs.changes.outputs.run_actions == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: actions
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:actions

  analyze-javascript:
    name: Analyze (javascript-typescript)
    needs: changes
    if: needs.changes.outputs.run_javascript == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:javascript-typescript

  analyze-rust:
    name: Analyze (rust)
    needs: changes
    if: needs.changes.outputs.run_rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: rust
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:rust

  code-scanning-gate:
    name: Code scanning gate
    needs:
      - analyze-actions
      - analyze-javascript
      - analyze-rust
    if: ${{ github.event_name == 'pull_request' && always() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: read
    steps:
      - name: Fail on open medium+ CodeQL alerts for this pull request
        env:
          GH_TOKEN: ${{ github.token }}
          PR_REF: refs/pull/${{ github.event.pull_request.number }}/merge
        shell: bash
        run: |
          set -euo pipefail

          alerts_json="$(gh api \
            -H 'Accept: application/vnd.github+json' \
            "/repos/${GITHUB_REPOSITORY}/code-scanning/alerts?state=open&ref=${PR_REF}&per_page=100")"

          medium_or_higher_alerts="$(jq '
            [
              .[]
              | select(.tool.name == "CodeQL")
              | select((.rule.security_severity_level // "") as $level | $level == "medium" or $level == "high" or $level == "critical")
              | {
                  number,
                  rule: .rule.id,
                  security_severity_level: .rule.security_severity_level,
                  html_url
                }
            ]
          ' <<< "${alerts_json}")"

          alert_count="$(jq 'length' <<< "${medium_or_higher_alerts}")"
          if [[ "${alert_count}" -gt 0 ]]; then
            echo "Open medium+ CodeQL alerts found for ${PR_REF}:" >&2
            jq -r '.[] | "- #\(.number) [\(.security_severity_level)] \(.rule) \(.html_url)"' <<< "${medium_or_higher_alerts}" >&2
            exit 1
          fi

          echo "No open medium+ CodeQL alerts found for ${PR_REF}."
