name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pull-requests: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: Detect CodeQL scope
    runs-on: ubuntu-latest
    outputs:
      run_actions: ${{ steps.decide.outputs.run_actions }}
      run_javascript: ${{ steps.decide.outputs.run_javascript }}
      run_rust: ${{ steps.decide.outputs.run_rust }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            actions:
              - '.github/workflows/**'
              - '.github/codeql/**'
            javascript:
              - 'frontend/**'
              - 'plugins/app/ralphx-external-mcp/**'
              - 'plugins/app/ralphx-mcp-server/**'
            rust:
              - 'src-tauri/**'
              - 'rust-toolchain.toml'

      - name: Decide CodeQL scope
        id: decide
        shell: bash
        run: |
          set -euo pipefail

          echo "run_actions=true" >> "${GITHUB_OUTPUT}"
          echo "run_javascript=true" >> "${GITHUB_OUTPUT}"
          echo "run_rust=true" >> "${GITHUB_OUTPUT}"

  analyze-actions:
    name: Analyze (actions)
    needs: changes
    if: needs.changes.outputs.run_actions == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: actions
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:actions

  analyze-javascript:
    name: Analyze (javascript-typescript)
    needs: changes
    if: needs.changes.outputs.run_javascript == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:javascript-typescript

  analyze-rust:
    name: Analyze (rust)
    needs: changes
    if: needs.changes.outputs.run_rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: rust
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:rust
