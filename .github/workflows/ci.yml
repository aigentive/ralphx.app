name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-tests:
    name: Rust Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
          components: clippy,rustfmt

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Validate SQLite migrations
        run: |
          python3 scripts/validate_sqlite_migrations.py

      - name: Run IPC contract tests
        run: |
          timeout 600 cargo test --lib --manifest-path src-tauri/Cargo.toml ipc_contract 2>&1

      - name: Run all Rust lib tests
        run: |
          cargo nextest run --manifest-path src-tauri/Cargo.toml --lib --profile ci

      - name: Run Rust doctests
        run: |
          timeout 600 cargo test --manifest-path src-tauri/Cargo.toml --doc

  frontend-tests:
    name: Frontend Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test:run

      - name: TypeScript check
        run: npm run typecheck

      - name: Lint
        run: npm run lint
