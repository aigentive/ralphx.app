name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-tests:
    name: Rust Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Run IPC contract tests
        run: |
          timeout 600 cargo test --lib --manifest-path src-tauri/Cargo.toml ipc_contract 2>&1

      - name: Run all Rust lib tests
        run: |
          timeout 600 cargo test --lib --manifest-path src-tauri/Cargo.toml 2>&1 | tail -20

  frontend-tests:
    name: Frontend Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test:run

      - name: TypeScript check
        run: npm run typecheck

      - name: Lint
        run: npm run lint
