name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect CI scope
    runs-on: ubuntu-latest
    outputs:
      run_automation: ${{ steps.decide.outputs.run_automation }}
      run_plugins: ${{ steps.decide.outputs.run_plugins }}
      run_rust: ${{ steps.decide.outputs.run_rust }}
      run_frontend: ${{ steps.decide.outputs.run_frontend }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            automation:
              - '.github/workflows/**'
              - '.github/codeql/**'
              - '.github/dependabot.yml'
              - 'scripts/build-prod-release.sh'
              - 'scripts/render-homebrew-cask.sh'
            plugins:
              - 'plugins/app/ralphx-external-mcp/**'
              - 'plugins/app/ralphx-mcp-server/**'
              - 'scripts/prepare-release-runtime.sh'
            rust:
              - 'src-tauri/**'
              - 'rust-toolchain.toml'
              - 'scripts/validate_sqlite_migrations.py'
            frontend:
              - 'frontend/**'

      - name: Decide CI scope
        id: decide
        shell: bash
        run: |
          set -euo pipefail

          echo "run_automation=${{ steps.filter.outputs.automation }}" >> "${GITHUB_OUTPUT}"

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            echo "run_plugins=true" >> "${GITHUB_OUTPUT}"
            echo "run_rust=true" >> "${GITHUB_OUTPUT}"
            echo "run_frontend=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "run_plugins=${{ steps.filter.outputs.plugins }}" >> "${GITHUB_OUTPUT}"
          echo "run_rust=${{ steps.filter.outputs.rust }}" >> "${GITHUB_OUTPUT}"
          echo "run_frontend=${{ steps.filter.outputs.frontend }}" >> "${GITHUB_OUTPUT}"

  automation-config:
    name: Automation Config
    needs: changes
    if: needs.changes.outputs.run_automation == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate workflow and automation YAML
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t yaml_files < <(
            git ls-files \
              '.github/workflows/*.yml' \
              '.github/workflows/*.yaml' \
              '.github/codeql/*.yml' \
              '.github/codeql/*.yaml' \
              '.github/dependabot.yml' \
              '.github/dependabot.yaml'
          )

          if [[ "${#yaml_files[@]}" -eq 0 ]]; then
            exit 0
          fi

          ruby -e 'require "yaml"; ARGV.each { |path| YAML.load_file(path) }' "${yaml_files[@]}"

      - name: Validate release scripts
        shell: bash
        run: |
          set -euo pipefail
          bash -n scripts/build-prod-release.sh
          bash -n scripts/render-homebrew-cask.sh

  rust-ipc-contracts:
    name: Rust IPC Contracts
    needs: changes
    if: needs.changes.outputs.run_rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RALPHX_TEST_MODE: "1"
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            pkg-config \
            wget

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Validate SQLite migrations
        run: |
          python3 scripts/validate_sqlite_migrations.py

      - name: Run IPC contract tests
        run: |
          cargo nextest run \
            --manifest-path src-tauri/Cargo.toml \
            --profile ci \
            --test task_commands \
            --test api_key_commands \
            --test project_commands \
            --test unified_chat_commands \
            --test task_step_commands \
            ipc_contract

  rust-lib-tests:
    name: Rust Lib Tests (Shard ${{ matrix.partition }})
    needs: changes
    if: needs.changes.outputs.run_rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        partition: ["1/2", "2/2"]
    env:
      RALPHX_TEST_MODE: "1"
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            pkg-config \
            wget

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Run Rust lib tests shard ${{ matrix.partition }}
        run: |
          cargo nextest run \
            --manifest-path src-tauri/Cargo.toml \
            --lib \
            --profile ci \
            --partition hash:${{ matrix.partition }}

  rust-doctests:
    name: Rust Doctests
    needs: changes
    if: needs.changes.outputs.run_rust == 'true' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RALPHX_TEST_MODE: "1"
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            pkg-config \
            wget

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Run Rust doctests
        run: |
          cargo test --manifest-path src-tauri/Cargo.toml --doc

  rust-tests:
    name: Rust Tests
    needs:
      - changes
      - rust-ipc-contracts
      - rust-lib-tests
      - rust-doctests
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Finalize Rust status
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "CI scope detection failed for Rust." >&2
            exit 1
          fi

          if [[ "${{ needs.changes.outputs.run_rust }}" != "true" ]]; then
            echo "No Rust-relevant changes detected for this pull request; skipping Rust suite."
            exit 0
          fi

          for job_result in \
            "${{ needs.rust-ipc-contracts.result }}" \
            "${{ needs.rust-lib-tests.result }}" \
            "${{ needs.rust-doctests.result }}"; do
            if [[ "${job_result}" != "success" && "${job_result}" != "skipped" ]]; then
              echo "Rust suite result: ${job_result}" >&2
              exit 1
            fi
          done

  plugin-checks:
    name: Plugin Checks (${{ matrix.package_name }})
    needs: changes
    if: needs.changes.outputs.run_plugins == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_name: External MCP
            package_dir: plugins/app/ralphx-external-mcp
            package_lock: plugins/app/ralphx-external-mcp/package-lock.json
          - package_name: Internal MCP
            package_dir: plugins/app/ralphx-mcp-server
            package_lock: plugins/app/ralphx-mcp-server/package-lock.json
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.package_lock }}

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.package_dir }}

      - name: TypeScript check
        shell: bash
        working-directory: ${{ matrix.package_dir }}
        run: |
          set -euo pipefail
          if node -e "const pkg = require('./package.json'); process.exit(pkg.scripts && pkg.scripts.typecheck ? 0 : 1)"; then
            npm run typecheck
          else
            echo "No typecheck script for ${PWD}; skipping."
          fi

      - name: Build plugin package
        run: npm run build
        working-directory: ${{ matrix.package_dir }}

      - name: Run plugin tests
        run: npm test
        working-directory: ${{ matrix.package_dir }}

  plugin-tests:
    name: Plugin Tests
    needs:
      - changes
      - plugin-checks
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Finalize plugin status
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "CI scope detection failed for plugins." >&2
            exit 1
          fi

          if [[ "${{ needs.changes.outputs.run_plugins }}" != "true" ]]; then
            echo "No plugin-relevant changes detected for this pull request; skipping plugin suite."
            exit 0
          fi

          if [[ "${{ needs.plugin-checks.result }}" != "success" ]]; then
            echo "Plugin suite result: ${{ needs.plugin-checks.result }}" >&2
            exit 1
          fi

  frontend-quality:
    name: Frontend Quality
    needs: changes
    if: needs.changes.outputs.run_frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: TypeScript check
        run: npm run typecheck
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

  frontend-tests-shard-1:
    name: Frontend Tests (Shard 1/2)
    needs: changes
    if: needs.changes.outputs.run_frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend tests shard 1/2
        run: npm run test:run -- --shard=1/2
        working-directory: frontend

  frontend-tests-shard-2:
    name: Frontend Tests (Shard 2/2)
    needs: changes
    if: needs.changes.outputs.run_frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend tests shard 2/2
        run: npm run test:run -- --shard=2/2
        working-directory: frontend

  frontend-tests:
    name: Frontend Tests
    needs:
      - changes
      - frontend-quality
      - frontend-tests-shard-1
      - frontend-tests-shard-2
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Finalize frontend status
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "CI scope detection failed for frontend." >&2
            exit 1
          fi

          if [[ "${{ needs.changes.outputs.run_frontend }}" != "true" ]]; then
            echo "No frontend-relevant changes detected for this pull request; skipping frontend suite."
            exit 0
          fi

          for job_result in \
            "${{ needs.frontend-quality.result }}" \
            "${{ needs.frontend-tests-shard-1.result }}" \
            "${{ needs.frontend-tests-shard-2.result }}"; do
            if [[ "${job_result}" != "success" ]]; then
              echo "Frontend suite result: ${job_result}" >&2
              exit 1
            fi
          done
