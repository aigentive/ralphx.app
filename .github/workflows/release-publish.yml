name: Release Publish

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "Release build workflow run ID to publish artifacts from"
        required: true
      ref:
        description: "Git tag ref the build came from (for example v0.2.0 or refs/tags/v0.2.0)"
        required: true
      version:
        description: "Version to release (for example 0.2.0 or v0.2.0)"
        required: true
      draft:
        description: "Create the public release as a draft"
        required: true
        type: boolean
        default: false
      prerelease:
        description: "Mark the public release as a prerelease"
        required: true
        type: boolean
        default: false
  workflow_run:
    workflows:
      - Release Build
    types:
      - completed

permissions:
  actions: read
  contents: write

concurrency:
  group: release-publish-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.source_run_id || github.event.workflow_run.id || github.run_id }}
  cancel-in-progress: false

env:
  PUBLIC_RELEASES_REPO: ${{ github.repository }}
  PUBLIC_RELEASES_BASE_URL: https://github.com/${{ github.repository }}/releases/download
  HOMEBREW_TAP_REPO: aigentive/homebrew-ralphx

jobs:
  metadata:
    name: Resolve publish metadata
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    outputs:
      source_run_id: ${{ steps.run_id.outputs.source_run_id }}
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      draft: ${{ steps.meta.outputs.draft }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Resolve source build run ID
        id: run_id
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            source_run_id="${{ github.event.inputs.source_run_id }}"
          else
            source_run_id="${{ github.event.workflow_run.id }}"
          fi

          if [[ -z "${source_run_id}" ]]; then
            echo "Release build run ID cannot be empty" >&2
            exit 1
          fi

          echo "source_run_id=${source_run_id}" >> "${GITHUB_OUTPUT}"

      - name: Download release metadata artifact
        uses: actions/download-artifact@v8
        with:
          github-token: ${{ github.token }}
          run-id: ${{ steps.run_id.outputs.source_run_id }}
          name: release-metadata
          path: release-metadata

      - name: Resolve publish metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          data_file="release-metadata/release-metadata.json"
          if [[ ! -f "${data_file}" ]]; then
            echo "Release metadata artifact missing from build run ${{ steps.run_id.outputs.source_run_id }}" >&2
            exit 1
          fi

          version="$(jq -r '.version' "${data_file}")"
          tag="$(jq -r '.tag' "${data_file}")"
          release_name="$(jq -r '.release_name' "${data_file}")"

          for value_name in version tag release_name; do
            if [[ -z "${!value_name:-}" || "${!value_name}" == "null" ]]; then
              echo "Release metadata field ${value_name} is missing in ${data_file}" >&2
              exit 1
            fi
          done

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            raw_ref="${{ github.event.inputs.ref }}"
            raw_version="${{ github.event.inputs.version }}"
            raw_draft="${{ github.event.inputs.draft }}"
            raw_prerelease="${{ github.event.inputs.prerelease }}"
            requested_version="${raw_version#v}"
            if [[ -z "${requested_version}" ]]; then
              echo "Release version cannot be empty" >&2
              exit 1
            fi

            requested_tag="v${requested_version}"
            normalized_ref="${raw_ref#refs/tags/}"
            if [[ "${normalized_ref}" != "${requested_tag}" ]]; then
              echo "Release ref must match the requested version tag. Expected ${requested_tag}, got ${raw_ref}." >&2
              exit 1
            fi

            if [[ "${requested_tag}" != "${tag}" || "${requested_version}" != "${version}" ]]; then
              echo "Requested release ${requested_tag} does not match build metadata ${tag} from run ${{ steps.run_id.outputs.source_run_id }}." >&2
              exit 1
            fi

            draft="${raw_draft}"
            prerelease="${raw_prerelease}"
          else
            draft="$(jq -r '.draft' "${data_file}")"
            prerelease="$(jq -r '.prerelease' "${data_file}")"

            for value_name in draft prerelease; do
              if [[ -z "${!value_name:-}" || "${!value_name}" == "null" ]]; then
                echo "Release metadata field ${value_name} is missing in ${data_file}" >&2
                exit 1
              fi
            done
          fi

          {
            echo "version=${version}"
            echo "tag=${tag}"
            echo "release_name=${release_name}"
            echo "draft=${draft}"
            echo "prerelease=${prerelease}"
          } >> "${GITHUB_OUTPUT}"

  publish-release:
    name: Publish public release assets
    needs: metadata
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Validate publishing environment
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "Missing GitHub token for release publishing" >&2
            exit 1
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          github-token: ${{ github.token }}
          run-id: ${{ needs.metadata.outputs.source_run_id }}
          path: release-assets

      - name: Download release metadata artifact
        uses: actions/download-artifact@v8
        with:
          github-token: ${{ github.token }}
          run-id: ${{ needs.metadata.outputs.source_run_id }}
          name: release-metadata
          path: release-metadata

      - name: Build release metadata files
        shell: bash
        run: |
          set -euo pipefail

          version="${{ needs.metadata.outputs.version }}"
          tag="${{ needs.metadata.outputs.tag }}"
          release_name="${{ needs.metadata.outputs.release_name }}"
          release_base="${PUBLIC_RELEASES_BASE_URL}/${tag}"

          if [[ ! -f release-metadata/release-notes.md ]]; then
            echo "Release notes artifact missing from build run ${{ needs.metadata.outputs.source_run_id }}" >&2
            exit 1
          fi
          cp release-metadata/release-notes.md release-assets/release-notes.md

          first_nonempty="$(awk 'NF { print; exit }' release-assets/release-notes.md)"
          if [[ "${first_nonempty}" == "# ${release_name}" || "${first_nonempty}" == "# ${tag}" ]]; then
            tmp_notes="$(mktemp)"
            EXPECTED_RELEASE_HEADING="# ${release_name}" EXPECTED_TAG_HEADING="# ${tag}" \
              awk '
                BEGIN {dropping=1; heading_removed=0}
                dropping && !heading_removed && $0 ~ /^[[:space:]]*$/ {next}
                dropping && !heading_removed && ($0 == ENVIRON["EXPECTED_RELEASE_HEADING"] || $0 == ENVIRON["EXPECTED_TAG_HEADING"]) {heading_removed=1; next}
                dropping && heading_removed && $0 ~ /^[[:space:]]*$/ {next}
                {dropping=0; print}
              ' release-assets/release-notes.md > "${tmp_notes}"
            mv "${tmp_notes}" release-assets/release-notes.md
          fi

          aarch64_updater="release-assets/release-aarch64/RalphX_${version}_aarch64.app.tar.gz"
          aarch64_sig="${aarch64_updater}.sig"
          x86_updater="release-assets/release-x86_64/RalphX_${version}_x86_64.app.tar.gz"
          x86_sig="${x86_updater}.sig"

          for path in \
            "${aarch64_updater}" \
            "${aarch64_sig}" \
            "${x86_updater}" \
            "${x86_sig}"; do
            if [[ ! -f "${path}" ]]; then
              echo "Required release asset missing: ${path}" >&2
              exit 1
            fi
          done

          find release-assets -type f \( -name '*.dmg' -o -name '*.app.tar.gz' \) -print0 \
            | sort -z \
            | xargs -0 shasum -a 256 > release-assets/checksums.txt

          jq -n \
            --arg version "${tag}" \
            --rawfile notes release-assets/release-notes.md \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg aarch64_url "${release_base}/RalphX_${version}_aarch64.app.tar.gz" \
            --arg aarch64_signature "$(tr -d '\n' < "${aarch64_sig}")" \
            --arg x86_url "${release_base}/RalphX_${version}_x86_64.app.tar.gz" \
            --arg x86_signature "$(tr -d '\n' < "${x86_sig}")" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": {
                  url: $aarch64_url,
                  signature: $aarch64_signature
                },
                "darwin-x86_64": {
                  url: $x86_url,
                  signature: $x86_signature
                }
              }
            }' > release-assets/latest.json

      - name: Create or update public release
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ needs.metadata.outputs.tag }}"
          release_name="${{ needs.metadata.outputs.release_name }}"
          draft="${{ needs.metadata.outputs.draft }}"
          prerelease="${{ needs.metadata.outputs.prerelease }}"

          mapfile -t asset_files < <(
            find release-assets -type f \
              \( -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.app.tar.gz.sig' -o -name 'checksums.txt' -o -name 'latest.json' \) \
              | sort
          )

          if [[ "${#asset_files[@]}" -eq 0 ]]; then
            echo "No release assets prepared" >&2
            exit 1
          fi

          if gh release view "${tag}" --repo "${PUBLIC_RELEASES_REPO}" >/dev/null 2>&1; then
            gh release edit "${tag}" \
              --repo "${PUBLIC_RELEASES_REPO}" \
              --title "${release_name}" \
              --notes-file release-assets/release-notes.md \
              --draft="${draft}" \
              --prerelease="${prerelease}" \
              --latest="$([[ "${draft}" == "true" || "${prerelease}" == "true" ]] && echo false || echo true)"

            gh release upload "${tag}" \
              --repo "${PUBLIC_RELEASES_REPO}" \
              --clobber \
              "${asset_files[@]}"
            exit 0
          fi

          create_args=(
            gh release create "${tag}"
            --repo "${PUBLIC_RELEASES_REPO}"
            --title "${release_name}"
            --notes-file release-assets/release-notes.md
            --latest="$([[ "${draft}" == "true" || "${prerelease}" == "true" ]] && echo false || echo true)"
          )

          if [[ "${draft}" == "true" ]]; then
            create_args+=(--draft)
          fi

          if [[ "${prerelease}" == "true" ]]; then
            create_args+=(--prerelease)
          fi

          create_args+=("${asset_files[@]}")
          "${create_args[@]}"

  update-homebrew-tap:
    name: Update Homebrew tap
    if: ${{ needs.metadata.outputs.draft != 'true' && needs.metadata.outputs.prerelease != 'true' }}
    needs:
      - metadata
      - publish-release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Validate tap publishing environment
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            echo "Missing required secret: HOMEBREW_TAP_TOKEN" >&2
            exit 1
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          github-token: ${{ github.token }}
          run-id: ${{ needs.metadata.outputs.source_run_id }}
          path: release-assets

      - name: Clone Homebrew tap
        shell: bash
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${HOMEBREW_TAP_REPO}.git" tap-repo

      - name: Render cask
        shell: bash
        run: |
          set -euo pipefail

          version="${{ needs.metadata.outputs.version }}"
          arm_dmg="release-assets/release-aarch64/RalphX_${version}_aarch64.dmg"
          intel_dmg="release-assets/release-x86_64/RalphX_${version}_x86_64.dmg"

          for path in "${arm_dmg}" "${intel_dmg}"; do
            if [[ ! -f "${path}" ]]; then
              echo "Required DMG missing for Homebrew tap update: ${path}" >&2
              exit 1
            fi
          done

          arm_sha="$(shasum -a 256 "${arm_dmg}" | awk '{print $1}')"
          intel_sha="$(shasum -a 256 "${intel_dmg}" | awk '{print $1}')"

          mkdir -p tap-repo/Casks
          {
            printf 'cask "ralphx" do\n'
            printf '  arch arm: "aarch64", intel: "x86_64"\n\n'
            printf '  version "%s"\n' "${version}"
            printf '  sha256 arm:   "%s",\n' "${arm_sha}"
            printf '         intel: "%s"\n\n' "${intel_sha}"
            printf '  url "https://github.com/%s/releases/download/v#{version}/RalphX_#{version}_#{arch}.dmg"\n' "${PUBLIC_RELEASES_REPO}"
            printf '  name "RalphX"\n'
            printf '  desc "Native Mac GUI for autonomous AI development"\n'
            printf '  homepage "https://github.com/%s"\n' "${PUBLIC_RELEASES_REPO}"
            printf '  auto_updates true\n\n'
            printf '  depends_on formula: "node"\n'
            printf '  depends_on macos: ">= :ventura"\n\n'
            printf '  app "RalphX.app"\n\n'
            printf '  caveats do\n'
            printf '    <<~EOS\n'
            printf '      Install at least one supported AI harness CLI after install.\n'
            printf '      RalphX can update itself in-app after install.\n'
            printf '      To force a Homebrew-managed refresh, run: brew upgrade --cask ralphx\n'
            printf '    EOS\n'
            printf '  end\n'
            printf 'end\n'
          } > tap-repo/Casks/ralphx.rb

      - name: Commit and push tap update
        shell: bash
        run: |
          set -euo pipefail

          cd tap-repo
          if [[ -z "$(git status --short -- Casks/ralphx.rb)" ]]; then
            echo "Homebrew cask already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/ralphx.rb
          git commit -m "chore: update ralphx cask to v${{ needs.metadata.outputs.version }}"
          git push origin HEAD:main
