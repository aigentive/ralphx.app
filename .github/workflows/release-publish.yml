name: Release Publish

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "Release build workflow run ID to publish artifacts from"
        required: true
      ref:
        description: "Git tag ref the build came from (for example v0.2.0 or refs/tags/v0.2.0)"
        required: true
      version:
        description: "Version to release (for example 0.2.0 or v0.2.0)"
        required: true
      draft:
        description: "Create the public release as a draft"
        required: true
        type: boolean
        default: false
      prerelease:
        description: "Mark the public release as a prerelease"
        required: true
        type: boolean
        default: false

permissions:
  actions: read
  contents: read

concurrency:
  group: release-publish-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.source_run_id || github.run_id }}
  cancel-in-progress: false

env:
  PUBLIC_RELEASES_REPO: aigentive/ralphx-releases
  PUBLIC_RELEASES_BASE_URL: https://github.com/aigentive/ralphx-releases/releases/download
  HOMEBREW_TAP_REPO: aigentive/homebrew-ralphx

jobs:
  metadata:
    name: Resolve publish metadata
    runs-on: ubuntu-latest
    outputs:
      source_run_id: ${{ steps.meta.outputs.source_run_id }}
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      draft: ${{ steps.meta.outputs.draft }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      source_ref: ${{ steps.meta.outputs.source_ref }}
    steps:
      - name: Resolve manual publish metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          raw_ref="${{ github.event.inputs.ref }}"
          raw_version="${{ github.event.inputs.version }}"
          raw_draft="${{ github.event.inputs.draft }}"
          raw_prerelease="${{ github.event.inputs.prerelease }}"
          source_run_id="${{ github.event.inputs.source_run_id }}"

          if [[ -z "${source_run_id}" ]]; then
            echo "Release build run ID cannot be empty" >&2
            exit 1
          fi

          version="${raw_version#v}"
          if [[ -z "${version}" ]]; then
            echo "Release version cannot be empty" >&2
            exit 1
          fi

          tag="v${version}"
          normalized_ref="${raw_ref#refs/tags/}"
          if [[ "${normalized_ref}" != "${tag}" ]]; then
            echo "Release ref must match the requested version tag. Expected ${tag}, got ${raw_ref}." >&2
            exit 1
          fi

          {
            echo "source_run_id=${source_run_id}"
            echo "version=${version}"
            echo "tag=${tag}"
            echo "release_name=RalphX ${tag}"
            echo "draft=${raw_draft}"
            echo "prerelease=${raw_prerelease}"
            echo "source_ref=refs/tags/${tag}"
          } >> "${GITHUB_OUTPUT}"

  publish-release:
    name: Publish public release assets
    needs: metadata
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.metadata.outputs.source_ref }}

      - name: Validate publishing environment
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "Missing required secret: RELEASES_REPO_TOKEN" >&2
            exit 1
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          github-token: ${{ github.token }}
          run-id: ${{ needs.metadata.outputs.source_run_id }}
          path: release-assets

      - name: Build release metadata files
        shell: bash
        run: |
          set -euo pipefail

          version="${{ needs.metadata.outputs.version }}"
          tag="${{ needs.metadata.outputs.tag }}"
          release_base="${PUBLIC_RELEASES_BASE_URL}/${tag}"

          notes_file="release-notes/${tag}.md"
          if [[ -f "${notes_file}" ]]; then
            cp "${notes_file}" release-assets/release-notes.md
          else
            {
              printf 'Release artifacts for %s.\n\n' "${tag}"
              printf 'Included:\n'
              printf '%s\n' \
                '- macOS Apple Silicon DMG' \
                '- macOS Intel DMG' \
                '- macOS Apple Silicon updater bundle' \
                '- macOS Intel updater bundle' \
                '- latest.json' \
                '- checksums.txt'
            } > release-assets/release-notes.md
          fi

          aarch64_updater="release-assets/release-aarch64/RalphX_${version}_aarch64.app.tar.gz"
          aarch64_sig="${aarch64_updater}.sig"
          x86_updater="release-assets/release-x86_64/RalphX_${version}_x86_64.app.tar.gz"
          x86_sig="${x86_updater}.sig"

          for path in \
            "${aarch64_updater}" \
            "${aarch64_sig}" \
            "${x86_updater}" \
            "${x86_sig}"; do
            if [[ ! -f "${path}" ]]; then
              echo "Required release asset missing: ${path}" >&2
              exit 1
            fi
          done

          find release-assets -type f \( -name '*.dmg' -o -name '*.app.tar.gz' \) -print0 \
            | sort -z \
            | xargs -0 shasum -a 256 > release-assets/checksums.txt

          jq -n \
            --arg version "${tag}" \
            --rawfile notes release-assets/release-notes.md \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg aarch64_url "${release_base}/RalphX_${version}_aarch64.app.tar.gz" \
            --arg aarch64_signature "$(tr -d '\n' < "${aarch64_sig}")" \
            --arg x86_url "${release_base}/RalphX_${version}_x86_64.app.tar.gz" \
            --arg x86_signature "$(tr -d '\n' < "${x86_sig}")" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": {
                  url: $aarch64_url,
                  signature: $aarch64_signature
                },
                "darwin-x86_64": {
                  url: $x86_url,
                  signature: $x86_signature
                }
              }
            }' > release-assets/latest.json

      - name: Create or update public release
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ needs.metadata.outputs.tag }}"
          release_name="${{ needs.metadata.outputs.release_name }}"
          draft="${{ needs.metadata.outputs.draft }}"
          prerelease="${{ needs.metadata.outputs.prerelease }}"

          mapfile -t asset_files < <(
            find release-assets -type f \
              \( -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.app.tar.gz.sig' -o -name 'checksums.txt' -o -name 'latest.json' \) \
              | sort
          )

          if [[ "${#asset_files[@]}" -eq 0 ]]; then
            echo "No release assets prepared" >&2
            exit 1
          fi

          if gh release view "${tag}" --repo "${PUBLIC_RELEASES_REPO}" >/dev/null 2>&1; then
            gh release edit "${tag}" \
              --repo "${PUBLIC_RELEASES_REPO}" \
              --title "${release_name}" \
              --notes-file release-assets/release-notes.md \
              --draft="${draft}" \
              --prerelease="${prerelease}" \
              --latest="$([[ "${draft}" == "true" || "${prerelease}" == "true" ]] && echo false || echo true)"

            gh release upload "${tag}" \
              --repo "${PUBLIC_RELEASES_REPO}" \
              --clobber \
              "${asset_files[@]}"
            exit 0
          fi

          create_args=(
            gh release create "${tag}"
            --repo "${PUBLIC_RELEASES_REPO}"
            --title "${release_name}"
            --notes-file release-assets/release-notes.md
            --latest="$([[ "${draft}" == "true" || "${prerelease}" == "true" ]] && echo false || echo true)"
          )

          if [[ "${draft}" == "true" ]]; then
            create_args+=(--draft)
          fi

          if [[ "${prerelease}" == "true" ]]; then
            create_args+=(--prerelease)
          fi

          create_args+=("${asset_files[@]}")
          "${create_args[@]}"

  update-homebrew-tap:
    name: Update Homebrew tap
    if: ${{ needs.metadata.outputs.draft != 'true' && needs.metadata.outputs.prerelease != 'true' }}
    needs:
      - metadata
      - publish-release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Validate tap publishing environment
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            echo "Missing required secret: HOMEBREW_TAP_TOKEN" >&2
            exit 1
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          github-token: ${{ github.token }}
          run-id: ${{ needs.metadata.outputs.source_run_id }}
          path: release-assets

      - name: Clone Homebrew tap
        shell: bash
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${HOMEBREW_TAP_REPO}.git" tap-repo

      - name: Render cask
        shell: bash
        run: |
          set -euo pipefail

          version="${{ needs.metadata.outputs.version }}"
          arm_dmg="release-assets/release-aarch64/RalphX_${version}_aarch64.dmg"
          intel_dmg="release-assets/release-x86_64/RalphX_${version}_x86_64.dmg"

          for path in "${arm_dmg}" "${intel_dmg}"; do
            if [[ ! -f "${path}" ]]; then
              echo "Required DMG missing for Homebrew tap update: ${path}" >&2
              exit 1
            fi
          done

          arm_sha="$(shasum -a 256 "${arm_dmg}" | awk '{print $1}')"
          intel_sha="$(shasum -a 256 "${intel_dmg}" | awk '{print $1}')"

          mkdir -p tap-repo/Casks
          ./scripts/render-homebrew-cask.sh "${version}" "${arm_sha}" "${intel_sha}" > tap-repo/Casks/ralphx.rb

      - name: Commit and push tap update
        shell: bash
        run: |
          set -euo pipefail

          cd tap-repo
          if [[ -z "$(git status --short -- Casks/ralphx.rb)" ]]; then
            echo "Homebrew cask already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/ralphx.rb
          git commit -m "chore: update ralphx cask to v${{ needs.metadata.outputs.version }}"
          git push origin HEAD:main
