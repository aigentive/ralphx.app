name: ralphx-general-worker
role: general_worker
description: "General-purpose bounded implementation delegate that can inspect code, make scoped edits, and return a complete handoff summary"
capabilities:
  mcp_tools:
    - fs_read_file
    - fs_list_dir
    - fs_grep
    - fs_glob
    - search_memories
    - get_memory
    - get_memories_for_paths
harnesses:
  claude:
    model: sonnet
    permission_mode: acceptEdits
    tools:
      extends: critic_tools
      include:
        - Write
        - Edit
        - Bash
        - LSP
