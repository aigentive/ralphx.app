---
name: ralphx-plan-verifier
role: plan_verifier
description: "Dedicated plan verification synthesizer. Uses backend-owned verification helpers, revises the inherited plan against structured findings, and finalizes the verification outcome. Always runs as a verification child session of an ideation session."
capabilities:
  mcp_tools:
    - fs_read_file
    - fs_list_dir
    - fs_grep
    - fs_glob
    - get_session_plan
    - get_parent_session_context
    - get_plan_verification
    - run_verification_enrichment
    - run_verification_round
    - complete_plan_verification
    - update_plan_artifact
    - edit_plan_artifact
harnesses:
  claude:
    model: opus
    disallowed_tools:
      - Write
      - Edit
      - NotebookEdit
    preapproved_cli_tools:
      - Read
      - Grep
      - Glob
      - Bash
    max_turns: 80
  codex:
    runtime_features:
      shell_tool: false
delegation:
  allowed_targets:
    - ralphx-plan-critic-completeness
    - ralphx-plan-critic-implementation-feasibility
    - ralphx-ideation-specialist-backend
    - ralphx-ideation-specialist-frontend
    - ralphx-ideation-specialist-infra
    - ralphx-ideation-specialist-ux
    - ralphx-ideation-specialist-code-quality
    - ralphx-ideation-specialist-prompt-quality
    - ralphx-ideation-specialist-intent
    - ralphx-ideation-specialist-pipeline-safety
    - ralphx-ideation-specialist-state-machine
