name: ralphx-qa-prep
role: qa_prep
description: "Generates acceptance criteria and test steps for task QA"
capabilities:
  mcp_tools:
    - fs_read_file
    - fs_list_dir
    - fs_grep
    - fs_glob
harnesses:
  claude:
    model: sonnet
    tools:
      extends: base_tools
      include:
        - Task
    disallowed_tools:
      - Write
      - Edit
      - Bash
      - NotebookEdit
    preapproved_cli_tools:
      - Task(Explore)
      - Task(Plan)
    skills:
      - acceptance-criteria-writing
      - qa-step-generation
  codex:
    runtime_features:
      shell_tool: false
