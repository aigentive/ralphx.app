---
name: ralphx-ideation-specialist-backend
role: ideation_specialist_backend
description: "Research Rust/Tauri/SQLite patterns for ideation teams"
capabilities:
  mcp_tools:
    - fs_read_file
    - fs_list_dir
    - fs_grep
    - fs_glob
    - create_team_artifact
    - get_team_artifacts
    - get_session_plan
    - get_artifact
    - list_session_proposals
    - get_proposal
    - get_parent_session_context
    - search_memories
    - get_memory
    - get_memories_for_paths
harnesses:
  claude:
    model: opus
    tools:
      extends: base_tools
    disallowed_tools:
      - Write
      - Edit
      - NotebookEdit
      - Bash
  codex:
    runtime_features:
      shell_tool: false
