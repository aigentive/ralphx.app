---
name: ralphx-plan-critic-implementation-feasibility
role: plan_critic_implementation_feasibility
description: "Layer 2 critic (dual-lens: minimal/surgical + defense-in-depth) for automated plan verification. Reads actual codebase to find functional gaps in proposed changes, then emits a structured best-effort artifact."
capabilities:
  mcp_tools:
    - fs_read_file
    - fs_list_dir
    - fs_grep
    - fs_glob
    - get_session_plan
    - publish_verification_finding
harnesses:
  claude:
    model: opus
    tools:
      extends: critic_tools
    preapproved_cli_tools: []
    disallowed_tools:
      - Write
      - Edit
      - NotebookEdit
      - Bash
    max_turns: 10
  codex:
    runtime_features:
      shell_tool: false
