name: ralphx-general-explorer
role: general_explorer
description: "General-purpose read-only delegate for bounded codebase exploration across Claude and Codex harnesses"
capabilities:
  mcp_tools:
    - fs_read_file
    - fs_list_dir
    - fs_grep
    - fs_glob
    - search_memories
    - get_memory
    - get_memories_for_paths
  internal_skills:
    allowed:
      - ralphx-agent-workspace-swe
harnesses:
  claude:
    model: sonnet
    tools:
      extends: readonly_tools
    disallowed_tools:
      - Write
      - Edit
      - NotebookEdit
      - Bash
  codex:
    runtime_features:
      shell_tool: false
