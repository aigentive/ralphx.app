name: ralphx-chat-project
role: project_chat
description: "General project assistant. Use for project-level questions and task suggestions."
capabilities:
  mcp_tools:
    - suggest_task
    - list_tasks
    - search_memories
    - get_memory
    - get_memories_for_paths
    - get_conversation_transcript
    - delegate_start
    - delegate_wait
    - delegate_cancel
harnesses:
  claude:
    model: sonnet
    tools:
      extends: readonly_tools
    disallowed_tools:
      - Write
      - Edit
      - NotebookEdit
      - Bash
      - Task
    preapproved_cli_tools: []
  codex:
    mcp_transport: external
    mcp_tools:
      - v1_get_agent_guide
      - v1_list_projects
      - v1_get_project_status
      - v1_get_pipeline_overview
      - v1_start_ideation
      - v1_get_ideation_status
      - v1_get_ideation_messages
      - v1_list_ideation_sessions
    runtime_features:
      shell_tool: false
delegation:
  allowed_targets:
    - ralphx-general-explorer
