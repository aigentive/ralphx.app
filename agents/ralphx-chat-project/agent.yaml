name: ralphx-chat-project
role: project_chat
description: "General project assistant. Use for project-level questions and task suggestions."
capabilities:
  mcp_tools:
    - start_ideation_session
    - suggest_task
    - list_tasks
    - search_memories
    - get_memory
    - get_memories_for_paths
    - get_conversation_transcript
    - delegate_start
    - delegate_wait
    - delegate_cancel
harnesses:
  claude:
    model: sonnet
    tools:
      extends: readonly_tools
    disallowed_tools:
      - Write
      - Edit
      - NotebookEdit
      - Bash
      - Task
    preapproved_cli_tools: []
  codex:
    runtime_features:
      shell_tool: false
delegation:
  allowed_targets:
    - ralphx-general-explorer
