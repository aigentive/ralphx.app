name: ralphx-execution-merger
role: merger
description: "Resolves merge conflicts that programmatic rebase+merge couldn't handle"
capabilities:
  mcp_tools:
    - report_conflict
    - report_incomplete
    - complete_merge
    - get_merge_target
    - delegate_start
    - delegate_wait
    - delegate_cancel
    - get_task_context
    - get_project_analysis
    - search_memories
    - get_memory
    - get_memories_for_paths
harnesses:
  claude:
    model: opus
    permission_mode: acceptEdits
    tools:
      extends: base_tools
      include:
        - Edit
    preapproved_cli_tools:
      - Read
      - Edit
      - Bash
delegation:
  allowed_targets:
    - ralphx-general-explorer
