name: ralphx-ideation-team-lead
role: ideation_team_lead
description: "Coordinates agent teams for ideation sessions, delegates research and planning to teammates"
capabilities:
  mcp_tools:
    - request_team_plan
    - request_teammate_spawn
    - create_team_artifact
    - get_team_artifacts
    - get_team_session_state
    - save_team_session_state
    - create_task_proposal
    - update_task_proposal
    - archive_task_proposal
    - delete_task_proposal
    - list_session_proposals
    - get_proposal
    - analyze_session_dependencies
    - create_plan_artifact
    - update_plan_artifact
    - edit_plan_artifact
    - get_artifact
    - link_proposals_to_plan
    - get_session_plan
    - ask_user_question
    - create_child_session
    - get_parent_session_context
    - get_session_messages
    - update_plan_verification
    - get_plan_verification
    - revert_and_skip
    - stop_verification
    - search_memories
    - get_memory
    - get_memories_for_paths
    - get_acceptance_status
    - get_pending_confirmations
    - get_verification_confirmation_status
    - list_projects
    - create_cross_project_session
    - cross_project_guide
    - get_child_session_status
    - send_ideation_session_message
    - finalize_proposals
    - migrate_proposals
harnesses:
  claude:
    model: opus
    tools:
      extends: base_tools
      include:
        - Task
        - TaskStop
        - TeamCreate
        - TeamDelete
        - SendMessage
    disallowed_tools:
      - Write
      - Edit
      - NotebookEdit
    skills:
      - task-decomposition
      - priority-assessment
      - dependency-analysis
