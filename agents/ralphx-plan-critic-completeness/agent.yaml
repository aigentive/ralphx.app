---
name: ralphx-plan-critic-completeness
role: plan_critic_completeness
description: "Layer 1 completeness critic for automated plan verification. Reviews plans for architecture, security, testing, and scope gaps, then emits a structured best-effort artifact."
capabilities:
  mcp_tools:
    - fs_read_file
    - fs_list_dir
    - fs_grep
    - fs_glob
    - get_session_plan
    - publish_verification_finding
harnesses:
  claude:
    model: opus
    tools:
      extends: critic_tools
    preapproved_cli_tools: []
    disallowed_tools:
      - Write
      - Edit
      - NotebookEdit
      - Bash
    max_turns: 10
  codex:
    runtime_features:
      shell_tool: false
