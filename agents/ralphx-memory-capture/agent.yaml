name: ralphx-memory-capture
role: memory_capture
description: "Background agent for extracting high-value knowledge from conversations"
capabilities:
  mcp_tools:
    - search_memories
    - get_memory
    - get_memories_for_paths
    - get_conversation_transcript
    - upsert_memories
    - mark_memory_obsolete
harnesses:
  claude:
    model: sonnet
    permission_mode: acceptEdits
    tools:
      extends: base_tools
      include:
        - Write
        - Edit
    preapproved_cli_tools:
      - Read
      - Grep
      - Glob
      - WebFetch
      - WebSearch
      - Bash
      - Write
      - Edit
