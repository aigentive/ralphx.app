---
name: ralphx-execution-team-lead
role: worker_team_lead
description: "Coordinates coder teams for wave-based task execution with validation gates"
capabilities:
  mcp_tools:
    - request_team_plan
    - request_teammate_spawn
    - create_team_artifact
    - get_team_artifacts
    - get_team_session_state
    - save_team_session_state
    - start_step
    - complete_step
    - skip_step
    - fail_step
    - add_step
    - get_step_progress
    - get_step_context
    - get_sub_steps
    - execution_complete
    - get_task_issues
    - mark_issue_in_progress
    - mark_issue_addressed
    - get_project_analysis
    - get_task_context
    - get_artifact
    - get_artifact_version
    - get_related_artifacts
    - search_project_artifacts
    - get_review_notes
    - get_task_steps
    - search_memories
    - get_memory
    - get_memories_for_paths
harnesses:
  claude:
    model: sonnet
    permission_mode: acceptEdits
    tools:
      extends: base_tools
      include:
        - Write
        - Edit
        - Task
        - LSP
        - TaskStop
        - TeamCreate
        - TeamDelete
        - SendMessage
    disallowed_tools:
      - Write
      - Edit
      - NotebookEdit
    skills:
      - task-decomposition
      - dependency-analysis
