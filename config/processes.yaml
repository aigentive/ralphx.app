# Canonical process registry for team-oriented Claude orchestration.
# `process_mapping` selects the default agent(s) for each process family.
# `team_constraints` defines per-process teammate limits, allowed tools, and presets.

process_mapping:
  ideation:
    default: ralphx-ideation
    readonly: ralphx-ideation-readonly
    team: ralphx-ideation-team-lead
  execution:
    default: ralphx-execution-worker
    team: ralphx-execution-team-lead
  review:
    default: ralphx-execution-reviewer
    chat: ralphx-review-chat
    history: ralphx-review-history
  merge:
    default: ralphx-execution-merger
  qa_prep:
    default: ralphx-qa-prep
  qa_refine:
    default: ralphx-qa-executor
  qa_test:
    default: ralphx-qa-executor
  chat_task:
    default: ralphx-chat-task
  chat_project:
    default: ralphx-chat-project
  design:
    default: ralphx-design-steward

team_constraints:
  # Defaults applied to processes that do not override a given field explicitly.
  _defaults:
    max_teammates: 5
    model_cap: sonnet
    mode: dynamic
    timeout_minutes: 20
    budget_limit: null
    auto_approve: true

  ideation:
    max_teammates: 5
    allowed_tools:
      - Read
      - Grep
      - Glob
      - Bash
      - WebFetch
      - WebSearch
    model_cap: opus
    mode: dynamic
    presets:
      - researcher
      - critic

  execution:
    max_teammates: 5
    allowed_tools:
      - Read
      - Write
      - Edit
      - Bash
      - Grep
      - Glob
      - WebFetch
      - WebSearch
    allowed_mcp_tools:
      - get_task_context
      - get_artifact
      - get_project_analysis
      - create_team_artifact
      - get_team_artifacts
      - start_step
      - complete_step
      - skip_step
      - fail_step
      - add_step
      - get_step_context
      - get_step_progress
      - get_sub_steps
    model_cap: sonnet
    mode: dynamic
    presets:
      - ralphx-execution-coder
    timeout_minutes: 30
    budget_limit: null

  review:
    max_teammates: 2
    allowed_tools:
      - Read
      - Grep
      - Glob
      - Bash
    model_cap: sonnet
    mode: constrained
    presets:
      - ralphx-execution-reviewer
