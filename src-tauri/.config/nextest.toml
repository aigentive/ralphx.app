[profile.default]
fail-fast = true
slow-timeout = { period = "60s", terminate-after = 2 }
leak-timeout = "500ms"

[profile.ci]
inherits = "default"
fail-fast = false
global-timeout = "30m"

[test-groups.git-heavy]
max-threads = 2

[test-groups.sqlite-integration]
max-threads = 4

[test-groups.perf-serial]
max-threads = 1

[test-groups.capability-serial]
max-threads = 1

[[profile.default.overrides]]
filter = 'binary(plan_selector_performance)'
test-group = 'perf-serial'
slow-timeout = { period = "120s", terminate-after = 2 }

[[profile.default.overrides]]
filter = 'binary(merge_system_hardening) or binary(deferred_main_merge_integration) or binary(repository_swapping) or binary(pr_mode_integration) or binary(pr_mode_fallback)'
test-group = 'git-heavy'
slow-timeout = { period = "120s", terminate-after = 2 }

[[profile.default.overrides]]
filter = 'binary(research_integration) or binary(workflow_integration) or binary(artifact_integration) or binary(methodology_integration) or binary(gsd_integration) or binary(metrics_integration) or binary(metrics_schema_validation) or binary(review_flows) or binary(execution_control_flows) or binary(state_machine_flows) or binary(qa_system_flows) or binary(per_project_execution_scoping)'
test-group = 'sqlite-integration'
slow-timeout = { period = "90s", terminate-after = 2 }
