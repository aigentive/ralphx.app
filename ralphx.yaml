# RalphX runtime configuration
#
# tool_sets:
#   Named reusable CLI tool groups used by agents via `tools.extends`.
#
# agents:
#   Defines all Claude agent runtime settings used by the Rust backend.
#
# Agent attributes:
# - name:
#   Short agent identifier (no "ralphx:" prefix). Must match values used in
#   Rust agent name constants and MCP allowlists.
# - system_prompt_file:
#   Full project-root-relative path to an agent markdown file (e.g.
#   `ralphx-plugin/agents/worker.md`) used to build
#   `--append-system-prompt` content.
# - model:
#   Optional Claude model alias passed as `--model` for this agent
#   (e.g. `haiku`, `sonnet`, `opus`).
# - settings_profile:
#   Optional per-agent override for `claude.settings_profile`.
#   When set, this agent uses `claude.settings_profiles.<name>`.
#   When omitted, agent inherits the global `claude.settings_profile`.
# - tools:
#   CLI tool strategy for this agent:
#   - mcp_only: true
#     Gives no built-in Claude CLI tools (`--tools ""`). Agent relies only on MCP.
#   - extends: <tool_set_name>
#     Inherit tools from `tool_sets.<name>`.
#   - include: [ToolA, ToolB]
#     Additional tools appended after inherited set.
#   Effective order is: inherited tools (if any) + include tools, deduplicated.
# - mcp_tools:
#   MCP tool names without `mcp__<mcp_server_name>__` prefix. These become
#   preapproved `mcp__<mcp_server_name>__<tool>` entries in `--allowedTools`.
# - preapproved_cli_tools:
#   Additional preapproved CLI tools/variants in `--allowedTools`
#   (e.g. `Task(Explore)`, `Task(Plan)`). All CLI tools from --tools are
#   auto-preapproved; list here only extras/variants (e.g. Task(Explore)).
#
# claude:
#   Runtime CLI behavior for Claude spawns.
# - mcp_server_name:
#   MCP server id used to build MCP tool ids:
#   `mcp__<mcp_server_name>__<tool_name>`.
#   This also controls the dynamic `--mcp-config` server key.
# - permission_mode:
#   Passed to `--permission-mode`. Valid Claude values include:
#   `default`, `acceptEdits`, `plan`, `delegate`, `dontAsk`, `bypassPermissions`.
# - setting_sources:
#   Optional setting sources passed to `--setting-sources` as a comma list.
#   Valid values: `user`, `project`, `local` (see docs/claude-code/cli-reference.md).
#   Omit to use Claude CLI defaults.
# - dangerously_skip_permissions:
#   If true, adds `--dangerously-skip-permissions`. Keep false by default.
# - permission_prompt_tool:
#   MCP tool name used by `--permission-prompt-tool`.
#   Accepts shorthand (e.g. `permission_request`) or full MCP tool id.
# - append_system_prompt_file:
#   If true, pass `--append-system-prompt-file <path>` using `system_prompt_file`.
#   If false, inline prompt content via `--append-system-prompt`.
# - settings:
#   Optional legacy Claude Code settings passed via `--settings` (JSON).
#   Prefer `settings_profile` + `settings_profiles` for profile-based config.
# - settings_profile:
#   Selected profile name from `settings_profiles` for `--settings` payload.
#   Can be overridden at runtime by env: `RALPHX_CLAUDE_SETTINGS_PROFILE`.
#   Per-agent override via env:
#   `RALPHX_CLAUDE_SETTINGS_PROFILE_<AGENT_NAME>` where non-alnum chars become `_`
#   and name is uppercased (e.g. orchestrator-ideation → ORCHESTRATOR_IDEATION).
# - settings_profile_defaults:
#   Optional settings merged into every selected profile.
# - settings_profiles:
#   Named `--settings` JSON objects.
#   Profiles can use `extends: <profile>` or `extends: [profile_a, profile_b]`.
#   `settings.env.<KEY>` values can be overridden by local env var:
#   `RALPHX_<KEY>` (e.g. `RALPHX_ANTHROPIC_DEFAULT_HAIKU_MODEL`).
#
# Notes:
# - Unknown attributes are ignored by the current parser.
# - Missing/invalid config falls back to embedded defaults bundled at compile time.

# defer_merge_enabled:
#   Controls merge deferral behavior.
#   - true (default): Defers merges when conflicts exist or agents are running
#   - false: All merges proceed immediately without deferral
#
# Env override: RALPHX_DEFER_MERGE_ENABLED=true|false
defer_merge_enabled: false

# Write tracing output to a per-launch log file in addition to console.
# Dev: logs/ralphx_YYYY-MM-DD_HH-MM-SS.log | Prod: ~/Library/Application Support/com.ralphx.app/logs/
# Env override: RALPHX_FILE_LOGGING=true|false
file_logging: true

# ── Runtime timeouts & limits ──────────────────────────────────────────────
# All fields required — no Rust serde defaults. Missing keys cause a deserialization error.
# All values can be overridden by env: RALPHX_<SECTION>_<FIELD> (e.g. RALPHX_STREAM_MERGE_LINE_READ_SECS)

timeouts:
  stream:
    # chat_service_streaming.rs — max stdout silence before killing merger agent (was 180s; raised to 600s so test runs don't time out)
    merge_line_read_secs: 600 # Env: RALPHX_STREAM_MERGE_LINE_READ_SECS
    # chat_service_streaming.rs — max time with no parseable stream events from merger agent
    merge_parse_stall_secs: 180 # Env: RALPHX_STREAM_MERGE_PARSE_STALL_SECS
    # chat_service_streaming.rs — max stdout silence for reviewer agent
    review_line_read_secs: 600 # Env: RALPHX_STREAM_REVIEW_LINE_READ_SECS
    # chat_service_streaming.rs — max time with no parseable events from reviewer
    review_parse_stall_secs: 120 # Env: RALPHX_STREAM_REVIEW_PARSE_STALL_SECS
    # chat_service_streaming.rs — max stdout silence for worker/ideation/other agents
    default_line_read_secs: 600 # Env: RALPHX_STREAM_DEFAULT_LINE_READ_SECS
    # chat_service_streaming.rs — max stall for worker/ideation/other agents
    default_parse_stall_secs: 180 # Env: RALPHX_STREAM_DEFAULT_PARSE_STALL_SECS
    # chat_service_streaming.rs — team lead wait time for teammate responses (generous: 1 hour)
    team_line_read_secs: 3600 # Env: RALPHX_STREAM_TEAM_LINE_READ_SECS
    # chat_service_streaming.rs — team lead stream stall limit (generous: 1 hour)
    team_parse_stall_secs: 3600 # Env: RALPHX_STREAM_TEAM_PARSE_STALL_SECS

reconciliation:
  # reconciliation.rs — overall deadline for merger agent; triggers MergeIncomplete + auto-retry if exceeded
  merger_timeout_secs: 1200 # Env: RALPHX_RECONCILIATION_MERGER_TIMEOUT_SECS
  # reconciliation.rs — max auto-retry attempts for tasks stuck in Merging state
  merging_max_retries: 3 # Env: RALPHX_RECONCILIATION_MERGING_MAX_RETRIES
  # reconciliation.rs — PendingMerge tasks older than this (minutes) are considered stale and retried
  pending_merge_stale_minutes: 2 # Env: RALPHX_RECONCILIATION_PENDING_MERGE_STALE_MINUTES
  # reconciliation.rs — QA tasks older than this (minutes) are considered stale
  qa_stale_minutes: 5 # Env: RALPHX_RECONCILIATION_QA_STALE_MINUTES
  # reconciliation.rs — initial backoff before retrying a MergeIncomplete task (exponential)
  merge_incomplete_retry_base_secs: 5 # Env: RALPHX_RECONCILIATION_MERGE_INCOMPLETE_RETRY_BASE_SECS
  # reconciliation.rs — cap on MergeIncomplete exponential backoff
  merge_incomplete_retry_max_secs: 1800 # Env: RALPHX_RECONCILIATION_MERGE_INCOMPLETE_RETRY_MAX_SECS
  # reconciliation.rs — max auto-retry attempts for MergeIncomplete before surfacing to user
  merge_incomplete_max_retries: 15 # Env: RALPHX_RECONCILIATION_MERGE_INCOMPLETE_MAX_RETRIES
  # reconciliation.rs — max validation-revert cycles before stopping auto-retry (prevents infinite loops)
  validation_revert_max_count: 2 # Env: RALPHX_RECONCILIATION_VALIDATION_REVERT_MAX_COUNT
  # reconciliation.rs — initial backoff before retrying a MergeConflict task
  merge_conflict_retry_base_secs: 60 # Env: RALPHX_RECONCILIATION_MERGE_CONFLICT_RETRY_BASE_SECS
  # reconciliation.rs — cap on MergeConflict exponential backoff
  merge_conflict_retry_max_secs: 600 # Env: RALPHX_RECONCILIATION_MERGE_CONFLICT_RETRY_MAX_SECS
  # reconciliation.rs — max auto-retry attempts for MergeConflict
  merge_conflict_max_retries: 3 # Env: RALPHX_RECONCILIATION_MERGE_CONFLICT_MAX_RETRIES
  # reconciliation.rs — max auto-retry attempts for tasks stuck in Executing
  executing_max_retries: 5 # Env: RALPHX_RECONCILIATION_EXECUTING_MAX_RETRIES
  # reconciliation.rs — max auto-retry attempts for tasks stuck in Reviewing
  reviewing_max_retries: 3 # Env: RALPHX_RECONCILIATION_REVIEWING_MAX_RETRIES
  # reconciliation.rs — max auto-retry attempts for tasks stuck in QA
  qa_max_retries: 3 # Env: RALPHX_RECONCILIATION_QA_MAX_RETRIES
  # reconciliation.rs — total wall-clock limit for Executing state (minutes)
  executing_max_wall_clock_minutes: 60 # Env: RALPHX_RECONCILIATION_EXECUTING_MAX_WALL_CLOCK_MINUTES
  # reconciliation.rs — total wall-clock limit for Reviewing state (minutes)
  reviewing_max_wall_clock_minutes: 30 # Env: RALPHX_RECONCILIATION_REVIEWING_MAX_WALL_CLOCK_MINUTES
  # reconciliation.rs — total wall-clock limit for QA state (minutes)
  qa_max_wall_clock_minutes: 15 # Env: RALPHX_RECONCILIATION_QA_MAX_WALL_CLOCK_MINUTES
  # side_effects.rs — max wall-clock seconds for programmatic merge attempt (cleanup + strategy dispatch)
  attempt_merge_deadline_secs: 60 # Env: RALPHX_RECONCILIATION_ATTEMPT_MERGE_DEADLINE_SECS
  # merge_outcome_handler.rs — max wall-clock seconds for post-merge validation commands (separate from git deadline)
  validation_deadline_secs: 1200 # Env: RALPHX_RECONCILIATION_VALIDATION_DEADLINE_SECS
  # handlers/merge.rs — grace period after merger agent run created before checking run-state vs registry (covers agent startup)
  merge_registry_grace_period_secs: 60 # Env: RALPHX_RECONCILIATION_MERGE_REGISTRY_GRACE_PERIOD_SECS
  # handlers/merge.rs — minimum cooldown before retrying after a validation failure (prevents rapid retry loops)
  validation_retry_min_cooldown_secs: 120 # Env: RALPHX_RECONCILIATION_VALIDATION_RETRY_MIN_COOLDOWN_SECS
  # handlers/merge.rs — stop auto-retrying after N consecutive validation failures (circuit breaker)
  validation_failure_circuit_breaker_count: 3 # Env: RALPHX_RECONCILIATION_VALIDATION_FAILURE_CIRCUIT_BREAKER_COUNT
  # handlers/merge.rs — skip MergeIncomplete retry if task was retried within this many seconds (starvation guard)
  merge_starvation_guard_secs: 60 # Env: RALPHX_RECONCILIATION_MERGE_STARVATION_GUARD_SECS
  # side_effects.rs — max seconds for pre_merge_cleanup before proceeding to merge (cleanup is best-effort)
  pre_merge_cleanup_timeout_secs: 60 # Env: RALPHX_RECONCILIATION_PRE_MERGE_CLEANUP_TIMEOUT_SECS
  # side_effects.rs — max seconds for branch freshness updates (update_plan_from_main, update_source_from_target)
  branch_freshness_timeout_secs: 60 # Env: RALPHX_RECONCILIATION_BRANCH_FRESHNESS_TIMEOUT_SECS
  # chat_service_merge.rs — grace period before merge watcher starts polling git state
  merge_watcher_grace_secs: 30 # Env: RALPHX_RECONCILIATION_MERGE_WATCHER_GRACE_SECS
  # chat_service_merge.rs — poll interval for merge watcher git state checks
  merge_watcher_poll_secs: 15 # Env: RALPHX_RECONCILIATION_MERGE_WATCHER_POLL_SECS
  # Circuit breaker: fires when threshold+ of last window failures share the same source
  merge_circuit_breaker_threshold: 3 # Env: RALPHX_MERGE_CIRCUIT_BREAKER_THRESHOLD
  merge_circuit_breaker_window: 5 # Env: RALPHX_MERGE_CIRCUIT_BREAKER_WINDOW
  # execution recovery — max auto-retry attempts for Failed tasks with transient failures (timeout/crash/stall)
  execution_failed_max_retries: 3 # Env: RALPHX_RECONCILIATION_EXECUTION_FAILED_MAX_RETRIES
  # execution recovery — initial backoff before retrying a Failed execution task (exponential base, seconds)
  execution_failed_retry_base_secs: 30 # Env: RALPHX_RECONCILIATION_EXECUTION_FAILED_RETRY_BASE_SECS
  # execution recovery — cap on execution retry exponential backoff (seconds)
  execution_failed_retry_max_secs: 600 # Env: RALPHX_RECONCILIATION_EXECUTION_FAILED_RETRY_MAX_SECS

git:
  # git_service/git_cmd.rs — per-command timeout to prevent hung git processes
  cmd_timeout_secs: 60 # Env: RALPHX_GIT_CMD_TIMEOUT_SECS
  # git_service/git_cmd.rs — max retry attempts for transient git failures
  max_retries: 3 # Env: RALPHX_GIT_MAX_RETRIES
  # git_service/git_cmd.rs — delay between retries (list, not env-overridable)
  retry_backoff_secs: [1, 2, 4]
  # side_effects.rs — age threshold for removing a stale .git/index.lock file
  index_lock_stale_secs: 5 # Env: RALPHX_GIT_INDEX_LOCK_STALE_SECS
  # merge_coordination.rs — settle time after SIGTERM before worktree deletion
  agent_kill_settle_secs: 0 # Env: RALPHX_GIT_AGENT_KILL_SETTLE_SECS
  # merge_coordination.rs — timeout for each stop_agent() call in pre-merge cleanup step 0
  agent_stop_timeout_secs: 3 # Env: RALPHX_GIT_AGENT_STOP_TIMEOUT_SECS
  # merge_coordination.rs — timeout for task worktree deletion during pre-merge cleanup
  cleanup_worktree_timeout_secs: 5 # Env: RALPHX_GIT_CLEANUP_WORKTREE_TIMEOUT_SECS
  # merge_coordination.rs — timeout for merge/rebase worktree deletion and git clean
  cleanup_git_op_timeout_secs: 30 # Env: RALPHX_GIT_CLEANUP_GIT_OP_TIMEOUT_SECS
  # running_agent_registry.rs — timeout for lsof +D scan in kill_worktree_processes_async
  worktree_lsof_timeout_secs: 10 # Env: RALPHX_GIT_WORKTREE_LSOF_TIMEOUT_SECS
  # merge_coordination.rs — outer timeout for entire step 0b kill phase (defense in depth)
  step_0b_kill_timeout_secs: 5 # Env: RALPHX_GIT_STEP_0B_KILL_TIMEOUT_SECS

scheduler:
  # task_scheduler_service.rs — how often the watchdog scans for stuck/stale tasks
  watchdog_interval_secs: 60 # Env: RALPHX_SCHEDULER_WATCHDOG_INTERVAL_SECS
  # task_scheduler_service.rs — how long a Ready task can sit before considered stale
  watchdog_stale_threshold_secs: 30 # Env: RALPHX_SCHEDULER_WATCHDOG_STALE_THRESHOLD_SECS
  # task_scheduler_service.rs — max spawn retries when task slot contention occurs
  max_contention_retries: 3 # Env: RALPHX_SCHEDULER_MAX_CONTENTION_RETRIES
  # task_scheduler_service.rs — sleep between contention retry attempts (milliseconds)
  contention_retry_delay_ms: 200 # Env: RALPHX_SCHEDULER_CONTENTION_RETRY_DELAY_MS
  # on_enter_states.rs — settle delay before spawning agent for a newly-Ready task (milliseconds)
  ready_settle_ms: 300 # Env: RALPHX_SCHEDULER_READY_SETTLE_MS
  # on_enter_states.rs — settle delay before scheduling unblocked tasks after a merge completes (milliseconds)
  merge_settle_ms: 100 # Env: RALPHX_SCHEDULER_MERGE_SETTLE_MS

supervisor:
  # supervisor_service.rs — wall-clock seconds before supervisor warns agent about time usage
  time_threshold_secs: 600 # Env: RALPHX_SUPERVISOR_TIME_THRESHOLD_SECS
  # supervisor_service.rs — token count at which supervisor warns agent
  token_threshold: 50000 # Env: RALPHX_SUPERVISOR_TOKEN_THRESHOLD
  # supervisor_service.rs — token count at which supervisor forces agent stop
  max_tokens: 100000 # Env: RALPHX_SUPERVISOR_MAX_TOKENS
  # supervisor_service.rs — how often supervisor checks for stuck/looping behavior
  progress_interval_secs: 30 # Env: RALPHX_SUPERVISOR_PROGRESS_INTERVAL_SECS
  # supervisor_service.rs — min repetitions before classifying as a loop
  loop_threshold: 3 # Env: RALPHX_SUPERVISOR_LOOP_THRESHOLD
  # supervisor_service.rs — min stuck-checks before taking action
  stuck_threshold: 5 # Env: RALPHX_SUPERVISOR_STUCK_THRESHOLD

limits:
  # chat_service_errors.rs — max times an agent conversation is auto-resumed after a provider error
  max_resume_attempts: 5 # Env: RALPHX_LIMITS_MAX_RESUME_ATTEMPTS

ideation:
  verification:
    # verification_reconciliation.rs — max adversarial review rounds [1,10]; hard cap, always terminates
    max_rounds: 5
    # If true, verification starts automatically when a plan is created
    auto_verify: true
    # If true, apply_proposals is blocked unless the plan is verified or skipped
    require_verification_for_accept: true
    # Min proposals before auto-verification triggers (when auto_verify=true)
    complexity_threshold: 3
    # verification_reconciliation.rs — sessions stuck in_progress longer than this are reset (seconds)
    # 90 minutes: 5 rounds × 10-15 min/round + buffer (D14). Env: RALPHX_VERIFICATION_RECONCILIATION_STALE_AFTER_SECS
    reconciliation_stale_after_secs: 5400
    # How often the reconciliation service scans for stuck sessions (seconds). Env: RALPHX_VERIFICATION_RECONCILIATION_INTERVAL_SECS
    reconciliation_interval_secs: 300

tool_sets:
  base_tools:
    [
      Read,
      Grep,
      Glob,
      Bash,
      WebFetch,
      WebSearch,
      Skill,
      TaskCreate,
      TaskUpdate,
      TaskGet,
      TaskList,
      TaskOutput,
      KillShell,
      MCPSearch,
    ]

# process_mapping:
#   Maps logical process slots to agent variants. Each slot has a `default`
#   agent (solo mode) and optional named variants (e.g. `team`, `readonly`).
#   Both sections are OPTIONAL — if absent, falls back to hardcoded constants.
#
#   Env override: RALPHX_PROCESS_VARIANT_<PROCESS>=<variant>
process_mapping:
  ideation:
    default: orchestrator-ideation
    readonly: orchestrator-ideation-readonly
    team: ideation-team-lead
  execution:
    default: ralphx-worker
    team: ralphx-worker-team
  review:
    default: ralphx-reviewer
    chat: ralphx-review-chat
    history: ralphx-review-history
  merge:
    default: ralphx-merger
  qa_prep:
    default: ralphx-qa-prep
  qa_refine:
    default: ralphx-qa-executor
  qa_test:
    default: ralphx-qa-executor
  chat_task:
    default: chat-task
  chat_project:
    default: chat-project

# team_constraints:
#   Per-process guardrails for dynamic team composition.
#   Team leads must operate within these bounds when composing teams.
#   _defaults apply to any process without explicit constraints.
#
#   Env overrides:
#     RALPHX_TEAM_MODE_<PROCESS>=dynamic|constrained
#     RALPHX_TEAM_MAX_<PROCESS>=<number>
#     RALPHX_TEAM_MODEL_CAP_<PROCESS>=haiku|sonnet|opus
team_constraints:
  _defaults:
    max_teammates: 5
    model_cap: sonnet
    mode: dynamic
    timeout_minutes: 20
    budget_limit: null

  ideation:
    max_teammates: 5
    allowed_tools: [Read, Grep, Glob, Bash, WebFetch, WebSearch]
    model_cap: sonnet
    mode: dynamic
    presets: [researcher, critic]

  execution:
    max_teammates: 5
    allowed_tools: [Read, Write, Edit, Bash, Grep, Glob, WebFetch, WebSearch]
    allowed_mcp_tools:
      [
        get_task_context,
        get_artifact,
        get_project_analysis,
        create_team_artifact,
        get_team_artifacts,
        start_step,
        complete_step,
        skip_step,
        fail_step,
        add_step,
        get_step_context,
        get_step_progress,
        get_sub_steps,
      ]
    model_cap: sonnet
    mode: dynamic
    presets: [ralphx-coder]
    timeout_minutes: 30
    budget_limit: null

  review:
    max_teammates: 2
    allowed_tools: [Read, Grep, Glob, Bash]
    model_cap: sonnet
    mode: constrained
    presets: [ralphx-reviewer]

claude:
  mcp_server_name: ralphx
  setting_sources: [user, project, local]
  permission_mode: default
  dangerously_skip_permissions: false
  permission_prompt_tool: permission_request
  append_system_prompt_file: true
  # Passed to claude CLI via --settings (JSON). See docs/claude-code/settings.md.
  settings_profile: default
  settings_profile_defaults:
    permissions:
      deny:
        - Read(./.env)
        - Read(./.env.*)
        - Edit(./.env)
        - Edit(./.env.*)
        - Write(./.env)
        - Write(./.env.*)
  settings_profiles:
    # Preserve existing default behavior: sandbox disabled.
    default:
      sandbox:
        enabled: false
    # Z.AI integration profile. Values can be overridden via src-tauri/.env:
    # RALPHX_Z_AI_ANTHROPIC_AUTH_TOKEN=...
    # RALPHX_Z_AI_ANTHROPIC_BASE_URL=https://api.z.ai/api/anthropic
    # RALPHX_Z_AI_API_TIMEOUT_MS=3000000
    # RALPHX_Z_AI_ANTHROPIC_DEFAULT_HAIKU_MODEL=glm-4.5-air
    # RALPHX_Z_AI_ANTHROPIC_DEFAULT_SONNET_MODEL=glm-4.7
    # RALPHX_Z_AI_ANTHROPIC_DEFAULT_OPUS_MODEL=glm-5
    # Generic RALPHX_* overrides still work as a fallback.
    z_ai:
      extends: default
      env:
        ANTHROPIC_AUTH_TOKEN: your_zai_api_key
        ANTHROPIC_BASE_URL: https://api.z.ai/api/anthropic
        API_TIMEOUT_MS: "3000000"
        ANTHROPIC_DEFAULT_HAIKU_MODEL: glm-4.5-air
        ANTHROPIC_DEFAULT_SONNET_MODEL: glm-4.7
        ANTHROPIC_DEFAULT_OPUS_MODEL: glm-5
    # OpenRouter integration profile. Values can be overridden via src-tauri/.env:
    # RALPHX_OPENROUTER_ANTHROPIC_AUTH_TOKEN=...
    # RALPHX_OPENROUTER_ANTHROPIC_BASE_URL=https://openrouter.ai/api
    # RALPHX_OPENROUTER_ANTHROPIC_API_KEY=
    # RALPHX_OPENROUTER_API_TIMEOUT_MS=3000000
    # RALPHX_OPENROUTER_ANTHROPIC_DEFAULT_HAIKU_MODEL=z-ai/glm-4.7-flash
    # RALPHX_OPENROUTER_ANTHROPIC_DEFAULT_SONNET_MODEL=z-ai/glm-4.7
    # RALPHX_OPENROUTER_ANTHROPIC_DEFAULT_OPUS_MODEL=z-ai/glm-5
    # Generic RALPHX_* overrides still work as a fallback.
    openrouter:
      extends: default
      env:
        ANTHROPIC_AUTH_TOKEN: your_openrouter_api_key
        ANTHROPIC_BASE_URL: https://openrouter.ai/api
        ANTHROPIC_API_KEY: ""
        API_TIMEOUT_MS: "3000000"
        ANTHROPIC_DEFAULT_HAIKU_MODEL: z-ai/glm-4.7-flash
        ANTHROPIC_DEFAULT_SONNET_MODEL: z-ai/glm-4.7
        ANTHROPIC_DEFAULT_OPUS_MODEL: z-ai/glm-5

agents:
  - name: orchestrator-ideation
    system_prompt_file: ralphx-plugin/agents/orchestrator-ideation.md
    model: opus
    tools: { extends: base_tools, include: [Task] }
    mcp_tools: [
        create_task_proposal,
        update_task_proposal,
        delete_task_proposal,
        list_session_proposals,
        get_proposal,
        analyze_session_dependencies,
        create_plan_artifact,
        update_plan_artifact,
        edit_plan_artifact,
        get_plan_artifact,
        link_proposals_to_plan,
        get_session_plan,
        ask_user_question,
        create_child_session,
        get_parent_session_context,
        # session context recovery
        get_session_messages,
        # verification tools
        update_plan_verification,
        get_plan_verification,
        revert_and_skip,
        # memory read tools
        search_memories,
        get_memory,
        get_memories_for_paths,
      ]
    preapproved_cli_tools: [Task(Explore), Task(Plan)]

  - name: orchestrator-ideation-readonly
    system_prompt_file: ralphx-plugin/agents/orchestrator-ideation.md
    model: sonnet
    tools: { extends: base_tools, include: [Task] }
    mcp_tools: [
        list_session_proposals,
        get_proposal,
        get_plan_artifact,
        get_session_plan,
        get_parent_session_context,
        # session linking tools
        create_child_session,
        # verification tools
        get_plan_verification,
        # memory read tools
        search_memories,
        get_memory,
